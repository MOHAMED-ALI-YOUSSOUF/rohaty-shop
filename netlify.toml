# netlify.toml — Rohaty Shop
# Configuration Netlify pour maximiser le cache CDN et minimiser les Function calls

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Cache des assets Next.js statiques (immuables) ───────────────────────────
# Les fichiers _next/static/* ont un hash dans leur nom — peuvent être cachés 1 an
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache des images optimisées par Next.js ──────────────────────────────────
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

# ─── Sécurité globale ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
